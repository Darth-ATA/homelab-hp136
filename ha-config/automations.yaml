# =============================================================================
# CIRCADIANA: LUZ DE DESPACHO
# Ajusta temperatura de color y brillo según la hora del día.
# Horario laboral (08:00-21:00): brillo al 100%, temperatura varía.
# Post-laboral (21:00-23:00): 2200K/40%. Noche profunda (23:00+): 2000K/20%.
# Entity IDs: light.ventilador_de_techo_despacho_main_light, light.innr_rb_272_t
# =============================================================================
- id: '1749052800001'
  alias: 'Circadiana: Luz despacho'
  description: 'Ajusta temperatura de color y brillo. Horario laboral (08-21): 100% brillo. Noche: 2200K/40%. Madrugada: 2000K/20%. Luces: despacho + innr RB 272 T.'
  triggers:
  - minutes: /15
    trigger: time_pattern
  conditions:
  - condition: or
    conditions:
    - condition: state
      entity_id: light.ventilador_de_techo_despacho_main_light
      state: 'on'
    - condition: state
      entity_id: light.innr_rb_272_t
      state: 'on'
  actions:
  - choose:
    - conditions:
      - condition: time
        before: 06:00:00
      sequence:
      - if:
        - condition: state
          entity_id: light.ventilador_de_techo_despacho_main_light
          state: 'on'
        then:
        - action: light.turn_off
          target:
            entity_id: light.ventilador_de_techo_despacho_main_light
          data: {}
      - if:
        - condition: state
          entity_id: light.innr_rb_272_t
          state: 'on'
        then:
        - action: light.turn_off
          target:
            entity_id: light.innr_rb_272_t
          data: {}
    - conditions:
      - condition: time
        after: 06:00:00
        before: 08:00:00
      sequence:
      - action: script.apply_circadian
        data:
          brightness: 80
          color_temp: 3000
    - conditions:
      - condition: time
        after: 08:00:00
        before: '12:00:00'
      sequence:
      - action: script.apply_circadian
        data:
          brightness: 100
          color_temp: 4500
    - conditions:
      - condition: time
        after: '12:00:00'
        before: '17:00:00'
      sequence:
      - action: script.apply_circadian
        data:
          brightness: 100
          color_temp: 4000
    - conditions:
      - condition: time
        after: '17:00:00'
        before: '19:00:00'
      sequence:
      - action: script.apply_circadian
        data:
          brightness: 100
          color_temp: 3500
    - conditions:
      - condition: time
        after: '19:00:00'
        before: '21:00:00'
      sequence:
      - action: script.apply_circadian
        data:
          brightness: 100
          color_temp: 3000
    - conditions:
      - condition: time
        after: '21:00:00'
        before: '23:00:00'
      sequence:
      - action: script.apply_circadian
        data:
          brightness: 40
          color_temp: 2200
    - conditions:
      - condition: time
        after: '23:00:00'
      sequence:
      - action: script.apply_circadian
        data:
          brightness: 20
          color_temp: 2000
  mode: single

# =============================================================================
# CIRCADIANA: VENTILADOR DESPACHO
# Ajusta velocidad del ventilador según hora del día + elevación solar.
# Sin sensor de temperatura interior, usamos el sol como proxy:
# - Elevación solar > 35° = sol alto = más calor → más velocidad
# - Ventana al oeste (268°) → las tardes (12-18h) son el periodo más cálido
#
# REQUIERE: sensor de temperatura opcional (descomentar seccion si existe).
# Si agregas un sensor (Aqara/Zigbee, Shelly, ESPHome):
#   - Condicion: numeric_state entity_id: sensor.temperatura_despacho above: 25
#   - Reemplaza la logica de hora+sol por temp real
#
# Entity IDs: ble_adv expone el fan como fan.ventilador_de_techo_despacho_main_fan.
# Si tu integracion usa number.xxx_speed (1-6) en vez de fan, reemplazar por:
#   action: number.set_value
#   data:
#     value: 4
# =============================================================================
- id: '1749052800002'
  alias: 'Circadiana: Ventilador despacho'
  description: Ajusta velocidad del ventilador segun hora y elevacion solar. Sin sensor interior, usa sol como proxy de calor.
  triggers:
  - minutes: /15
    trigger: time_pattern
  conditions:
  - condition: state
    entity_id: fan.ventilador_de_techo_despacho_main_fan
    state:
    - 'on'
  actions:
  - choose:
    - conditions:
      - condition: time
        before: 08:00:00
      sequence:
      - action: fan.turn_off
        target:
          entity_id: fan.ventilador_de_techo_despacho_main_fan
        data: {}
    - conditions:
      - condition: time
        after: 08:00:00
        before: '12:00:00'
      sequence:
      - action: fan.set_percentage
        target:
          entity_id: fan.ventilador_de_techo_despacho_main_fan
        data:
          percentage: 25
    - conditions:
      - condition: time
        after: '12:00:00'
        before: '18:00:00'
      sequence:
      - if:
        - condition: numeric_state
          entity_id: sun.sun
          attribute: elevation
          above: 35
        then:
        - action: fan.set_percentage
          target:
            entity_id: fan.ventilador_de_techo_despacho_main_fan
          data:
            percentage: 75
        else:
        - action: fan.set_percentage
          target:
            entity_id: fan.ventilador_de_techo_despacho_main_fan
          data:
            percentage: 50
    - conditions:
      - condition: time
        after: '18:00:00'
        before: '21:00:00'
      sequence:
      - action: fan.set_percentage
        target:
          entity_id: fan.ventilador_de_techo_despacho_main_fan
        data:
          percentage: 50
    - conditions:
      - condition: time
        after: '21:00:00'
      sequence:
      - action: fan.set_percentage
        target:
          entity_id: fan.ventilador_de_techo_despacho_main_fan
        data:
          percentage: 25
  mode: single

# =============================================================================
# (Automation existente: termo gym)
# =============================================================================
- id: '1743833516442'
  alias: Preguntar activar termo al llegar al gym
  description: Pregunta si activar el termo cuando llego al gimnasio si está apagado
  triggers:
  - entity_id: person.alejandro
    zone: zone.dreamfit_moratalaz
    event: enter
    trigger: zone
  conditions:
  - condition: state
    entity_id: switch.sonoff_s60zbtpf
    state: 'off'
  actions:
  - data:
      title: "🔋 Termo Gym"
      message: ¿Quieres encender el termo ahora que estás en el gym?
      data:
        tag: termo_gym
        actions:
        - action: ACTIVATE_TERMO
          title: Sí, encender
        - action: IGNORE_TERMO
          title: 'No'
    action: notify.mobile_app_alejandros_iphone
  - wait_for_trigger:
    - event_type: mobile_app_notification_action
      event_data:
        action: ACTIVATE_TERMO
      trigger: event
    timeout:
      hours: 0
      minutes: 15
      seconds: 0
      milliseconds: 0
    continue_on_timeout: false
  - target:
      entity_id: switch.sonoff_s60zbtpf
    action: switch.turn_on
  - data:
      message: Termo activado.
    action: notify.mobile_app_alejandros_iphone
  mode: single
