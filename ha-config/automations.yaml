# =============================================================================
# CIRCADIANA: LUZ DE DESPACHO
# Ajusta temperatura de color y brillo según la hora del día.
# Horario laboral (08:00-21:00): brillo al 100%, temperatura varía.
# Post-laboral (21:00-23:00): 2200K/40%. Noche profunda (23:00+): 2000K/20%.
# Entity IDs: light.ventilador_de_techo_despacho_main_light, light.innr_rb_272_t
# =============================================================================
- id: '1749052800001'
  alias: 'Circadiana: Luz despacho'
  description: 'Ajusta temperatura de color y brillo. Horario laboral (08-21): 100% brillo. Noche: 2200K/40%. Madrugada: 2000K/20%. Luces: despacho + innr RB 272 T.'
  triggers:
  - minutes: /15
    trigger: time_pattern
  conditions:
  - condition: or
    conditions:
    - condition: state
      entity_id: light.ventilador_de_techo_despacho_main_light
      state: 'on'
    - condition: state
      entity_id: light.innr_rb_272_t
      state: 'on'
  actions:
  - choose:
    - conditions:
      - condition: time
        before: 06:00:00
      sequence:
      - if:
        - condition: state
          entity_id: light.ventilador_de_techo_despacho_main_light
          state: 'on'
        then:
        - action: light.turn_off
          target:
            entity_id: light.ventilador_de_techo_despacho_main_light
          data: {}
      - if:
        - condition: state
          entity_id: light.innr_rb_272_t
          state: 'on'
        then:
        - action: light.turn_off
          target:
            entity_id: light.innr_rb_272_t
          data: {}
    - conditions:
      - condition: time
        after: 06:00:00
        before: 08:00:00
      sequence:
      - action: script.apply_circadian
        data:
          brightness: 80
          color_temp: 3000
    - conditions:
      - condition: time
        after: 08:00:00
        before: '12:00:00'
      sequence:
      - action: script.apply_circadian
        data:
          brightness: 100
          color_temp: 4500
    - conditions:
      - condition: time
        after: '12:00:00'
        before: '17:00:00'
      sequence:
      - action: script.apply_circadian
        data:
          brightness: 100
          color_temp: 4000
    - conditions:
      - condition: time
        after: '17:00:00'
        before: '19:00:00'
      sequence:
      - action: script.apply_circadian
        data:
          brightness: 100
          color_temp: 3500
    - conditions:
      - condition: time
        after: '19:00:00'
        before: '21:00:00'
      sequence:
      - action: script.apply_circadian
        data:
          brightness: 100
          color_temp: 3000
    - conditions:
      - condition: time
        after: '21:00:00'
        before: '23:00:00'
      sequence:
      - action: script.apply_circadian
        data:
          brightness: 40
          color_temp: 2200
    - conditions:
      - condition: time
        after: '23:00:00'
      sequence:
      - action: script.apply_circadian
        data:
          brightness: 20
          color_temp: 2000
  mode: single

# =============================================================================
# CIRCADIANA: VENTILADOR DESPACHO (TEMPERATURA)
# Ajusta velocidad del ventilador según temperatura interior real.
# Usa sensor Switchbot en lugar de elevación solar como proxy.
# NUNCA enciende el ventilador automáticamente — solo ajusta si ya está encendido.
# Bandas: <24°C OFF | 24-26 25% | 26-28 50% | 28-30 75% | ≥30 100%
# Horario silencioso [23:00, 08:00): tope al 25%.
# =============================================================================
- id: '1768000000000'
  alias: 'Circadiana: Ventilador despacho (temp)'
  description: 'Ajusta velocidad del ventilador según temperatura interior. Nunca enciende el ventilador automáticamente.'
  triggers:
  - trigger: time_pattern
    minutes: /15
  - trigger: state
    entity_id: sensor.meter_pro_co2_9540_temperatura
    for:
      minutes: 5
  conditions:
  - condition: state
    entity_id: fan.ventilador_de_techo_despacho_main_fan
    state: 'on'
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ states('sensor.meter_pro_co2_9540_temperatura') in ['unavailable', 'unknown', 'none'] }}"
      sequence:
      - action: system_log.write
        data:
          message: "Fan control: indoor temperature sensor not available"
          level: warning
    - conditions:
      - condition: numeric_state
        entity_id: sensor.meter_pro_co2_9540_temperatura
        below: 24
      sequence:
      - action: fan.turn_off
        target:
          entity_id: fan.ventilador_de_techo_despacho_main_fan
    - conditions:
      - condition: time
        after: '23:00:00'
        before: '08:00:00'
      sequence:
      - action: fan.set_percentage
        target:
          entity_id: fan.ventilador_de_techo_despacho_main_fan
        data:
          percentage: 25
    - conditions:
      - condition: numeric_state
        entity_id: sensor.meter_pro_co2_9540_temperatura
        above: 29
      sequence:
      - action: fan.set_percentage
        target:
          entity_id: fan.ventilador_de_techo_despacho_main_fan
        data:
          percentage: 100
    - conditions:
      - condition: numeric_state
        entity_id: sensor.meter_pro_co2_9540_temperatura
        above: 27
        below: 30
      sequence:
      - action: fan.set_percentage
        target:
          entity_id: fan.ventilador_de_techo_despacho_main_fan
        data:
          percentage: 75
    - conditions:
      - condition: numeric_state
        entity_id: sensor.meter_pro_co2_9540_temperatura
        above: 25
        below: 28
      sequence:
      - action: fan.set_percentage
        target:
          entity_id: fan.ventilador_de_techo_despacho_main_fan
        data:
          percentage: 50
    - conditions:
      - condition: numeric_state
        entity_id: sensor.meter_pro_co2_9540_temperatura
        above: 23
        below: 26
      sequence:
      - action: fan.set_percentage
        target:
          entity_id: fan.ventilador_de_techo_despacho_main_fan
        data:
          percentage: 25
  mode: single

# =============================================================================
# (Automation existente: termo gym)
# =============================================================================
- id: '1743833516442'
  alias: Preguntar activar termo al llegar al gym
  description: Pregunta si activar el termo cuando llego al gimnasio si está apagado
  triggers:
  - entity_id: person.alejandro
    zone: zone.dreamfit_moratalaz
    event: enter
    trigger: zone
  conditions:
  - condition: state
    entity_id: switch.sonoff_s60zbtpf
    state: 'off'
  actions:
  - data:
      title: "🔋 Termo Gym"
      message: ¿Quieres encender el termo ahora que estás en el gym?
      data:
        tag: termo_gym
        actions:
        - action: ACTIVATE_TERMO
          title: Sí, encender
        - action: IGNORE_TERMO
          title: 'No'
    action: notify.mobile_app_alejandros_iphone
  - wait_for_trigger:
    - event_type: mobile_app_notification_action
      event_data:
        action: ACTIVATE_TERMO
      trigger: event
    timeout:
      hours: 0
      minutes: 15
      seconds: 0
      milliseconds: 0
    continue_on_timeout: false
  - target:
      entity_id: switch.sonoff_s60zbtpf
    action: switch.turn_on
  - data:
      message: Termo activado.
    action: notify.mobile_app_alejandros_iphone
  mode: single

# =============================================================================
# LAVADORA: Automatización inteligente por PVPC
# =============================================================================
#
# Flujo:
#   1. Se detecta inicio por pico de consumo > 50W sostenido 30s
#   2. Si no es hora barata dentro 08-22 → apaga enchufe, marca apagada
#   3. Llega la hora barata → enciende enchufe automáticamente
#   4. Termina el ciclo (consumo < 10W x 5 min) → notificación al móvil
#   5. Usuario marca "Ya tendí" → resetea todo
#
# Reglas:
#   - Restricción 08-22: la lavadora solo arranca SI está en hora barata
#   - Si ya está funcionando, NO se toca el enchufe (que termine el ciclo)
#   - Si llega la hora barata y estaba apagada por la automación, se enciende
#   - Si arranca manualmente en hora barata, se deja correr
# =============================================================================

# -----------------------------------------------------------------------------
# Detectar inicio de ciclo
# -----------------------------------------------------------------------------
- id: 'lavadora_inicio_001'
  alias: "Lavadora - Inicio de ciclo"
  description: >
    Detecta arranque por consumo > 5W sostenido 30s.
    Si no es hora barata dentro de 08-22, apaga el enchufe y marca apagada_por_automatizacion.
    Si es hora barata, lo deja correr.
  triggers:
  - trigger: numeric_state
    entity_id: sensor.lavadero_sonoff_s60zbtpf_lavadora_potencia
    above: 5
    for:
      seconds: 30
  conditions:
  - condition: state
    entity_id: input_boolean.lavadora_automatizacion_activa
    state: 'off'
  actions:
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.lavadora_automatizacion_activa
  - delay:
      seconds: 5
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ now().hour >= 8 and now().hour < 22 }}"
      sequence:
      - choose:
        - conditions:
          - condition: state
            entity_id: binary_sensor.lavadora_en_hora_barata
            state: 'on'
          sequence:
          - action: switch.turn_on
            target:
              entity_id: switch.lavadero_sonoff_s60zbtpf_lavadora
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.lavadora_apagada_por_automatizacion
          - action: notify.send_message
            data:
              title: "🫧 Lavadora"
              message: "Arrancó en hora barata. Ciclo en curso 💪"
            target:
              entity_id:
                - notify.mobile_app_alejandros_iphone
                - notify.miriam_iphone
        - conditions:
          - condition: state
            entity_id: binary_sensor.lavadora_en_hora_barata
            state: 'off'
          sequence:
          - action: switch.turn_off
            target:
              entity_id: switch.lavadero_sonoff_s60zbtpf_lavadora
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.lavadora_apagada_por_automatizacion
          - action: notify.send_message
            data:
              title: "🫧 Lavadora"
              message: "Arrancó pero no es hora barata. Enchufe apagado. Esperando hora más barata ({{ states('sensor.lavadora_hora_mas_barata') }}:00)."
            target:
              entity_id:
                - notify.mobile_app_alejandros_iphone
                - notify.miriam_iphone
    - conditions:
      - condition: template
        value_template: "{{ now().hour >= 22 or now().hour < 8 }}"
      sequence:
      - action: switch.turn_off
        target:
          entity_id: switch.lavadero_sonoff_s60zbtpf_lavadora
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.lavadora_apagada_por_automatizacion
      - action: notify.send_message
        data:
          title: "🫧 Lavadora"
          message: "Arrancó pero está fuera del horario 08-22. Enchufe apagado."
        target:
          entity_id:
            - notify.mobile_app_alejandros_iphone
            - notify.miriam_iphone
  mode: single

# -----------------------------------------------------------------------------
# Encender cuando llega la hora más barata
# -----------------------------------------------------------------------------
- id: 'lavadora_hora_barata_001'
  alias: "Lavadora - Encender en hora barata"
  description: >
    Cada hora en punto, si es la hora más barata del día entre 08-22
    y la lavadora fue apagada por la automatización, enciende el enchufe.
  triggers:
  - trigger: template
    value_template: >
      {{ now().minute == 0
         and now().hour == states('sensor.lavadora_hora_mas_barata') | int(-1)
         and now().hour >= 8 and now().hour < 22 }}
  conditions:
  - condition: state
    entity_id: input_boolean.lavadora_automatizacion_activa
    state: 'on'
  - condition: state
    entity_id: input_boolean.lavadora_apagada_por_automatizacion
    state: 'on'
  actions:
  - action: switch.turn_on
    target:
      entity_id: switch.lavadero_sonoff_s60zbtpf_lavadora
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.lavadora_apagada_por_automatizacion
  - action: notify.mobile_app_alejandros_iphone
    data:
      title: "\u26A1 Lavadora - Hora barata"
      message: "Lleg\u00F3 la hora m\u00E1s barata. Enciendo la lavadora."
      data:
        tag: lavadora_hora_barata
  - action: notify.miriam_iphone
    data:
      title: "\u26A1 Lavadora - Hora barata"
      message: "Lleg\u00F3 la hora m\u00E1s barata. Enciendo la lavadora."
      data:
        tag: lavadora_hora_barata
  mode: single

# -----------------------------------------------------------------------------
# Fin de ciclo
# -----------------------------------------------------------------------------
- id: 'lavadora_fin_ciclo_001'
  alias: "Lavadora - Fin de ciclo"
  description: >
    Cuando el consumo baja a < 10W por 5 minutos y la lavadora estaba corriendo
    (no apagada por la automatización), notifica al móvil.
  triggers:
  - trigger: numeric_state
    entity_id: sensor.lavadero_sonoff_s60zbtpf_lavadora_potencia
    below: 10
    for:
      minutes: 5
  conditions:
  - condition: state
    entity_id: input_boolean.lavadora_automatizacion_activa
    state: 'on'
  - condition: state
    entity_id: input_boolean.lavadora_apagada_por_automatizacion
    state: 'off'
  actions:
  - action: notify.mobile_app_alejandros_iphone
    data:
      title: "\U0001F9FA Lavadora - Ciclo terminado"
      message: "La lavadora termin\u00F3. Ya pod\u00E9s tender la ropa."
      data:
        tag: lavadora_fin
        actions:
        - action: LAVADORA_TENDIDA
          title: "Ya tend\u00ED"
  - action: notify.miriam_iphone
    data:
      title: "\U0001F9FA Lavadora - Ciclo terminado"
      message: "La lavadora termin\u00F3. Ya pod\u00E9s tender la ropa."
      data:
        tag: lavadora_fin
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.lavadora_ciclo_terminado
  mode: single

# -----------------------------------------------------------------------------
# Manejar acción "Ya tendí" desde la notificación
# -----------------------------------------------------------------------------
- id: 'lavadora_notificacion_tendida_001'
  alias: "Lavadora - Responder 'Ya tendí'"
  description: "Cuando el usuario toca 'Ya tendí' en la notificación, marca el input_boolean."
  triggers:
  - trigger: event
    event_type: mobile_app_notification_action
    event_data:
      action: LAVADORA_TENDIDA
  actions:
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.lavadora_tendida
  mode: single

# -----------------------------------------------------------------------------
# Reset completo
# -----------------------------------------------------------------------------
- id: 'lavadora_reset_001'
  alias: "Lavadora - Reset por tendido"
  description: "Resetea todos los flags de la automatización cuando el usuario marca que ya tendió."
  triggers:
  - trigger: state
    entity_id: input_boolean.lavadora_tendida
    to: 'on'
  actions:
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.lavadora_automatizacion_activa
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.lavadora_apagada_por_automatizacion
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.lavadora_tendida
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.lavadora_ciclo_terminado
  mode: single

# -----------------------------------------------------------------------------
# Recordatorio de tendido cada 5 minutos
# -----------------------------------------------------------------------------
- id: 'lavadora_recordatorio_001'
  alias: "Lavadora - Recordatorio de tendido"
  description: "Cada 5 minutos recuerda tender la ropa si el ciclo terminó y nadie marcó 'Ya tendí'."
  triggers:
  - trigger: time_pattern
    minutes: /5
  conditions:
  - condition: state
    entity_id: input_boolean.lavadora_ciclo_terminado
    state: 'on'
  - condition: state
    entity_id: input_boolean.lavadora_tendida
    state: 'off'
  actions:
  - action: notify.mobile_app_alejandros_iphone
    data:
      title: "\u23F0 Lavadora - Recordatorio"
      message: "La lavadora termin\u00F3 hace rato. No te olvides de tender la ropa."
      data:
        tag: lavadora_recordatorio
        actions:
        - action: LAVADORA_TENDIDA
          title: "Ya tend\u00ED"
  - action: notify.miriam_iphone
    data:
      title: "\u23F0 Lavadora - Recordatorio"
      message: "La lavadora termin\u00F3 hace rato. No te olvides de tender la ropa."
      data:
        tag: lavadora_recordatorio
  mode: single

# =============================================================================
# VENTILACIÓN: Notificaciones para abrir/cerrar ventanas
# Compara temperatura interior vs exterior y notifica al usuario.
# Máquina de estados (input_select.ventilation_state) evita notificaciones duplicadas.
# Solo notifica en transiciones de estado. Sin acciones en los botones.
# =============================================================================
- id: '1768000000001'
  alias: 'Ventilación: Notificaciones ventanas'
  description: 'Compara temperatura interior y exterior para recomendar abrir/cerrar ventanas. Máquina de estados evita notificaciones duplicadas.'
  triggers:
  - trigger: state
    entity_id: sensor.meter_pro_co2_9540_temperatura
  - trigger: state
    entity_id: sensor.indoor_outdoor_meter_1c24_temperatura
  actions:
  - variables:
      indoor: "{{ states('sensor.meter_pro_co2_9540_temperatura') }}"
      outdoor: "{{ states('sensor.indoor_outdoor_meter_1c24_temperatura') }}"
      cur: >-
        {% set s = states('input_select.ventilation_state') %}
        {% if s in ['normal','ventilation_recommended','close_windows'] %}{{ s }}
        {% else %}normal{% endif %}
      ibad: "{{ indoor in ['unavailable','unknown','none'] }}"
      obad: "{{ outdoor in ['unavailable','unknown','none'] }}"
      numeric: "{{ (indoor | float(-999)) != -999 and (outdoor | float(-999)) != -999 }}"
      delta: "{{ (outdoor | float(-999)) - (indoor | float(-999)) }}"
      target: >-
        {% if ibad and obad %}normal
        {% elif not ibad and not obad and numeric
          and ( (cur == 'normal' and delta <= -1.0) or
                (cur == 'ventilation_recommended' and delta >= 1.0) or
                (cur == 'close_windows' and delta <= -1.0) )
        %}
          {% if delta <= -1.0 %}ventilation_recommended
          {% elif delta >= 1.0 %}close_windows
          {% endif %}
        {% else %}{{ cur }}{% endif %}
  - if:
    - condition: template
      value_template: "{{ target != cur }}"
    then:
    - action: input_select.select_option
      target:
        entity_id: input_select.ventilation_state
      data:
        option: "{{ target }}"
    - choose:
      - conditions:
        - condition: template
          value_template: "{{ target == 'ventilation_recommended' }}"
        sequence:
        - action: notify.send_message
          data:
            title: "🌬️ Ventilación"
            message: "Abre las ventanas — está más fresco fuera que dentro."
          target:
            entity_id:
              - notify.mobile_app_alejandros_iphone
              - notify.mobile_app_miriam_iphone
        - action: persistent_notification.create
          data:
            title: "🌬️ Ventilación"
            message: "Abre las ventanas — está más fresco fuera que dentro."
            notification_id: ventilation_recommended
      - conditions:
        - condition: template
          value_template: "{{ target == 'close_windows' }}"
        sequence:
        - action: notify.send_message
          data:
            title: "🌬️ Ventilación"
            message: "Cierra las ventanas — está más caliente fuera que dentro."
          target:
            entity_id:
              - notify.mobile_app_alejandros_iphone
              - notify.mobile_app_miriam_iphone
        - action: persistent_notification.create
          data:
            title: "🌬️ Ventilación"
            message: "Cierra las ventanas — está más caliente fuera que dentro."
            notification_id: close_windows
  mode: single

# =============================================================================
# CALIDAD DEL AIRE: Notificaciones de CO₂
# Monitorea la concentración de CO₂ y notifica cuando está alta o se recupera.
# Máquina de estados (input_select.air_quality_state) evita notificaciones duplicadas.
# Estados: normal (CO₂ < 800 ppm), bad (CO₂ > 1000 ppm). Transición con 5 min de histéresis.
# =============================================================================
- id: '1768000000002'
  alias: 'Calidad de aire: Notificaciones'
  description: 'Monitorea la concentración de CO₂ en el despacho. Estado normal → bad al superar 1000 ppm durante 5 min. Estado bad → normal al bajar de 800 ppm durante 5 min.'
  triggers:
  - trigger: state
    entity_id: sensor.meter_pro_co2_9540_dioxido_de_carbono
    for:
      minutes: 5
  actions:
  - variables:
      co2: "{{ states('sensor.meter_pro_co2_9540_dioxido_de_carbono') }}"
      cur: >-
        {% set s = states('input_select.air_quality_state') %}
        {% if s in ['normal', 'bad'] %}{{ s }}{% else %}normal{% endif %}
      co2bad: "{{ co2 in ['unavailable', 'unknown', 'none'] }}"
      target: >-
        {% if co2bad %}{{ cur }}
        {% elif (co2 | float(-999)) > 1000 and cur == 'normal' %}bad
        {% elif (co2 | float(-999)) < 800 and cur == 'bad' %}normal
        {% else %}{{ cur }}{% endif %}
  - if:
    - condition: template
      value_template: "{{ target != cur }}"
    then:
    - action: input_select.select_option
      target:
        entity_id: input_select.air_quality_state
      data:
        option: "{{ target }}"
    - choose:
      - conditions:
        - condition: template
          value_template: "{{ target == 'bad' }}"
        sequence:
        - action: notify.send_message
          data:
            title: "🌬️ Calidad del aire"
            message: "La concentración de CO₂ es alta. Abre las ventanas para ventilar."
            data:
              tag: air_quality_bad
          target:
            entity_id:
              - notify.mobile_app_alejandros_iphone
              - notify.miriam_iphone
        - action: persistent_notification.create
          data:
            title: "🌬️ Calidad del aire"
            message: "La concentración de CO₂ es alta. Abre las ventanas para ventilar."
            notification_id: air_quality_bad
      - conditions:
        - condition: template
          value_template: "{{ target == 'normal' }}"
        sequence:
        - action: notify.send_message
          data:
            title: "🌬️ Calidad del aire"
            message: "La calidad del aire ha mejorado. Ya puedes cerrar las ventanas."
            data:
              tag: air_quality_normal
          target:
            entity_id:
              - notify.mobile_app_alejandros_iphone
              - notify.miriam_iphone
        - action: persistent_notification.create
          data:
            title: "🌬️ Calidad del aire"
            message: "La calidad del aire ha mejorado. Ya puedes cerrar las ventanas."
            notification_id: air_quality_normal
  mode: single

# =============================================================================
# NIGHT PURGE: Apertura nocturna
# Cuando hace más fresco fuera que dentro y >24°C después de las 21h,
# notifica para abrir ventanas con botones accionables.
# =============================================================================
- id: '1768000000003'
  alias: 'Night purge: Apertura nocturna'
  description: 'Cuando hace más fresco fuera que dentro y >24°C después de las 21h, notifica para abrir ventanas. Accionable: botones para marcar abiertas o ignorar.'
  triggers:
  - trigger: time_pattern
    minutes: /15
  conditions:
  - condition: state
    entity_id: input_boolean.modo_ventilacion_nocturna
    state: 'on'
  - condition: state
    entity_id: input_boolean.night_purge_skip_today
    state: 'off'
  - condition: state
    entity_id: input_boolean.ventanas_abiertas
    state: 'off'
  - condition: or
    conditions:
    - condition: time
      after: '21:00:00'
      before: '22:00:00'
    - condition: time
      after: '22:00:00'
      before: '23:00:00'
    - condition: time
      after: '23:00:00'
      before: '00:00:00'
  - condition: template
    value_template: >
      {{ states('sensor.meter_pro_co2_9540_temperatura') not in ['unavailable', 'unknown', 'none']
         and states('sensor.indoor_outdoor_meter_1c24_temperatura') not in ['unavailable', 'unknown', 'none'] }}
  - condition: numeric_state
    entity_id: sensor.meter_pro_co2_9540_temperatura
    above: 24
  - condition: template
    value_template: >
      {{ states('sensor.indoor_outdoor_meter_1c24_temperatura') | float(-999)
         < states('sensor.meter_pro_co2_9540_temperatura') | float(-999) }}
  actions:
  - action: notify.send_message
    data:
      title: "🌙 Ventilación nocturna"
      message: "Abre las ventanas. Está más fresco fuera que dentro y es buena hora para ventilar la casa."
      data:
        tag: night_purge_opening
    target:
      entity_id:
        - notify.mobile_app_alejandros_iphone
        - notify.mobile_app_miriam_iphone
  - action: notify.mobile_app_alejandros_iphone
    data:
      title: "🌙 Ventilación nocturna"
      message: "Abre las ventanas. Está más fresco fuera que dentro y es buena hora para ventilar la casa."
      data:
        tag: night_purge_opening
        actions:
        - action: NIGHT_PURGE_OPENED
          title: "Ya he abierto"
        - action: NIGHT_PURGE_SKIP_TODAY
          title: "Ignorar por hoy"
  - wait_for_trigger:
    - event_type: mobile_app_notification_action
      event_data:
        action: NIGHT_PURGE_OPENED
      trigger: event
    - event_type: mobile_app_notification_action
      event_data:
        action: NIGHT_PURGE_SKIP_TODAY
      trigger: event
    timeout:
      minutes: 15
    continue_on_timeout: true
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ wait.trigger is not none and wait.trigger.event.data.action == 'NIGHT_PURGE_OPENED' }}"
      sequence:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.ventanas_abiertas
    - conditions:
      - condition: template
        value_template: "{{ wait.trigger is not none and wait.trigger.event.data.action == 'NIGHT_PURGE_SKIP_TODAY' }}"
      sequence:
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.night_purge_skip_today
  mode: single

# =============================================================================
# NIGHT PURGE: Cierre matutino
# Cuando hace más calor fuera que dentro después de las 7h y las ventanas
# están abiertas, notifica para cerrar.
# =============================================================================
- id: '1768000000004'
  alias: 'Night purge: Cierre matutino'
  description: 'Cuando hace más calor fuera que dentro después de las 7h y las ventanas están abiertas, notifica para cerrar. Accionable: botón para marcar cerradas.'
  triggers:
  - trigger: time_pattern
    minutes: /15
  conditions:
  - condition: state
    entity_id: input_boolean.modo_ventilacion_nocturna
    state: 'on'
  - condition: state
    entity_id: input_boolean.ventanas_abiertas
    state: 'on'
  - condition: or
    conditions:
    - condition: time
      after: '07:00:00'
      before: '08:00:00'
    - condition: time
      after: '08:00:00'
      before: '09:00:00'
    - condition: time
      after: '09:00:00'
      before: '10:00:00'
  - condition: template
    value_template: >
      {{ states('sensor.meter_pro_co2_9540_temperatura') not in ['unavailable', 'unknown', 'none']
         and states('sensor.indoor_outdoor_meter_1c24_temperatura') not in ['unavailable', 'unknown', 'none'] }}
  - condition: template
    value_template: >
      {{ states('sensor.indoor_outdoor_meter_1c24_temperatura') | float(-999)
         >= states('sensor.meter_pro_co2_9540_temperatura') | float(-999) }}
  actions:
  - action: notify.send_message
    data:
      title: "☀️ Cierre matutino"
      message: "Cierra las ventanas. Ya está más caliente fuera que dentro. Es hora de mantener el fresco."
      data:
        tag: night_purge_closing
    target:
      entity_id:
        - notify.mobile_app_alejandros_iphone
        - notify.mobile_app_miriam_iphone
  - action: notify.mobile_app_alejandros_iphone
    data:
      title: "☀️ Cierre matutino"
      message: "Cierra las ventanas. Ya está más caliente fuera que dentro. Es hora de mantener el fresco."
      data:
        tag: night_purge_closing
        actions:
        - action: NIGHT_PURGE_CLOSED
          title: "Ya he cerrado"
  - wait_for_trigger:
    - event_type: mobile_app_notification_action
      event_data:
        action: NIGHT_PURGE_CLOSED
      trigger: event
    timeout:
      minutes: 15
    continue_on_timeout: true
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ wait.trigger is not none and wait.trigger.event.data.action == 'NIGHT_PURGE_CLOSED' }}"
      sequence:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.ventanas_abiertas
  mode: single

