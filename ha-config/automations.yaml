# =============================================================================
# CIRCADIANA: LUZ DE DESPACHO
# Ajusta temperatura de color y brillo según la hora del día.
# Ventana al oeste (268°): el sol de la tarde compensa luz artificial,
# por eso bajamos brillo entre 12-17h cuando el sol está alto.
# temp_color en mireds (color_temp): 222=4500K, 250=4000K, 333=3000K,
# 370=2700K, 455=2200K, 500=2000K.
# Entity IDs: verificar en HA Developer Tools > States y ajustar si es necesario.
# =============================================================================
- id: '1749052800001'
  alias: "Circadiana: Luz despacho"
  description: "Ajusta temperatura de color y brillo segun hora del dia. Maniana (>08:00): 4500K/80%. Tarde sol oeste (12-17h): 4000K/60%. Noche: 2200K/25%."
  trigger:
    - platform: time_pattern
      minutes: /15
  condition: []
  action:
    - choose:
        # Madrugada: apagar (00:00 - 06:00)
        - conditions:
            - condition: time
              before: "06:00:00"
          sequence:
            - action: light.turn_off
              target:
                entity_id: light.ventilador_de_techo_despacho
        # Amanecer: transicion suave (06:00 - 08:00)
        - conditions:
            - condition: time
              after: "06:00:00"
              before: "08:00:00"
          sequence:
            - action: light.turn_on
              metadata: {}
              data:
                brightness_pct: 50
                color_temp: 370
              target:
                entity_id: light.ventilador_de_techo_despacho
        # Maniana: trabajo, luz fria (08:00 - 12:00)
        - conditions:
            - condition: time
              after: "08:00:00"
              before: "12:00:00"
          sequence:
            - action: light.turn_on
              metadata: {}
              data:
                brightness_pct: 80
                color_temp: 222
              target:
                entity_id: light.ventilador_de_techo_despacho
        # Tarde: sol del oeste compensa, bajamos luz artificial (12:00 - 17:00)
        - conditions:
            - condition: time
              after: "12:00:00"
              before: "17:00:00"
          sequence:
            - action: light.turn_on
              metadata: {}
              data:
                brightness_pct: 60
                color_temp: 250
              target:
                entity_id: light.ventilador_de_techo_despacho
        # Atardecer: transicion a calido (17:00 - 19:00)
        - conditions:
            - condition: time
              after: "17:00:00"
              before: "19:00:00"
          sequence:
            - action: light.turn_on
              metadata: {}
              data:
                brightness_pct: 70
                color_temp: 333
              target:
                entity_id: light.ventilador_de_techo_despacho
        # Noche temprano: calido bajo (19:00 - 21:00)
        - conditions:
            - condition: time
              after: "19:00:00"
              before: "21:00:00"
          sequence:
            - action: light.turn_on
              metadata: {}
              data:
                brightness_pct: 40
                color_temp: 370
              target:
                entity_id: light.ventilador_de_techo_despacho
        # Noche: muy calido, minimo (21:00 - 23:00)
        - conditions:
            - condition: time
              after: "21:00:00"
              before: "23:00:00"
          sequence:
            - action: light.turn_on
              metadata: {}
              data:
                brightness_pct: 25
                color_temp: 455
              target:
                entity_id: light.ventilador_de_techo_despacho
        # Trasnoche: minimo (23:00+)
        - conditions:
            - condition: time
              after: "23:00:00"
          sequence:
            - action: light.turn_on
              metadata: {}
              data:
                brightness_pct: 15
                color_temp: 500
              target:
                entity_id: light.ventilador_de_techo_despacho
  mode: single

# =============================================================================
# CIRCADIANA: VENTILADOR DESPACHO
# Ajusta velocidad del ventilador según hora del día + elevación solar.
# Sin sensor de temperatura interior, usamos el sol como proxy:
# - Elevación solar > 35° = sol alto = más calor → más velocidad
# - Ventana al oeste (268°) → las tardes (12-18h) son el periodo más cálido
#
# REQUIERE: sensor de temperatura opcional (descomentar seccion si existe).
# Si agregas un sensor (Aqara/Zigbee, Shelly, ESPHome):
#   - Condicion: numeric_state entity_id: sensor.temperatura_despacho above: 25
#   - Reemplaza la logica de hora+sol por temp real
#
# Entity IDs: ble_adv expone el fan como entidad fan. Si tu integracion usa
# number.xxx_speed (1-6) en vez de fan, reemplazar por:
#   action: number.set_value
#   data:
#     value: 4
# =============================================================================
- id: '1749052800002'
  alias: "Circadiana: Ventilador despacho"
  description: "Ajusta velocidad del ventilador segun hora y elevacion solar. Sin sensor interior, usa sol como proxy de calor."
  trigger:
    - platform: time_pattern
      minutes: /15
  condition: []
  action:
    - choose:
        # Maniana temprano: apagado (antes de 08:00)
        - conditions:
            - condition: time
              before: "08:00:00"
          sequence:
            - action: fan.turn_off
              target:
                entity_id: fan.ventilador_de_techo_despacho
        # Maniana: circulacion suave (08:00 - 12:00)
        - conditions:
            - condition: time
              after: "08:00:00"
              before: "12:00:00"
          sequence:
            - action: fan.set_percentage
              target:
                entity_id: fan.ventilador_de_techo_despacho
              data:
                percentage: 25
        # Tarde: pico de calor del oeste (12:00 - 18:00)
        - conditions:
            - condition: time
              after: "12:00:00"
              before: "18:00:00"
          sequence:
            # Si el sol esta alto (>35° de elevacion), mas velocidad
            - if:
                - condition: numeric_state
                  entity_id: sun.sun
                  attribute: elevation
                  above: 35
              then:
                - action: fan.set_percentage
                  target:
                    entity_id: fan.ventilador_de_techo_despacho
                  data:
                    percentage: 75
              else:
                - action: fan.set_percentage
                  target:
                    entity_id: fan.ventilador_de_techo_despacho
                  data:
                    percentage: 50
        # Atardecer/ocaso: circulacion media (18:00 - 21:00)
        - conditions:
            - condition: time
              after: "18:00:00"
              before: "21:00:00"
          sequence:
            - action: fan.set_percentage
              target:
                entity_id: fan.ventilador_de_techo_despacho
              data:
                percentage: 50
        # Noche: suave o breeze (21:00+)
        - conditions:
            - condition: time
              after: "21:00:00"
          sequence:
            # Intentar preset breeze si existe, sino velocidad baja
            - action: fan.set_percentage
              target:
                entity_id: fan.ventilador_de_techo_despacho
              data:
                percentage: 25
  mode: single

# =============================================================================
# (Automation existente: termo gym)
# =============================================================================
- id: '1743833516442'
  alias: Preguntar activar termo al llegar al gym
  description: Pregunta si activar el termo cuando llego al gimnasio si está apagado
  triggers:
  - entity_id: person.alejandro
    zone: zone.dreamfit_moratalaz
    event: enter
    trigger: zone
  conditions:
  - condition: state
    entity_id: switch.sonoff_s60zbtpf
    state: 'off'
  actions:
  - data:
      title: "🔋 Termo Gym"
      message: ¿Quieres encender el termo ahora que estás en el gym?
      data:
        tag: termo_gym
        actions:
        - action: ACTIVATE_TERMO
          title: Sí, encender
        - action: IGNORE_TERMO
          title: 'No'
    action: notify.mobile_app_alejandros_iphone
  - wait_for_trigger:
    - event_type: mobile_app_notification_action
      event_data:
        action: ACTIVATE_TERMO
      trigger: event
    timeout:
      hours: 0
      minutes: 15
      seconds: 0
      milliseconds: 0
    continue_on_timeout: false
  - target:
      entity_id: switch.sonoff_s60zbtpf
    action: switch.turn_on
  - data:
      message: Termo activado.
    action: notify.mobile_app_alejandros_iphone
  mode: single
