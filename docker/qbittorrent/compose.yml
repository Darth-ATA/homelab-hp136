services:
  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid
      - WEBUI_PORT=8080
    volumes:
      - /root/docker/qbittorrent/config:/config
      - /data/torrents:/downloads
    ports:
      - "8081:8080"  # qBittorrent UI
      - "6881:6881"   # Torrent port
      - "6881:6881/udp"
    restart: unless-stopped

networks:
  default:
    name: arrsuite