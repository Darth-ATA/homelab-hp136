# Arcane - Game Server Management Panel
# Access: http://192.168.1.142:3552
# Configure game servers via the web interface

services:
  arcane:
    image: ghcr.io/getarcaneapp/arcane:latest
    container_name: arcane
    restart: unless-stopped
    ports:
      - "3552:3552"
    volumes:
      - /root/docker/arcane/data:/app/data
      - /root/docker/arcane/servers:/app/servers
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid
      - APP_URL=http://192.168.1.142:3552
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - default

networks:
  default:
    driver: bridge
