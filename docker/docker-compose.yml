# Media Stack - Complete Setup
# Usage: docker compose -f docker-compose.yml up -d

networks:
  media_network:
    driver: bridge

services:
  # VPN Tunnel for qBittorrent
  gluetun:
    image: ghcr.io/qdm12/gluetun
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - OPENVPN_USER=${VPN_USER}
      - OPENVPN_PASSWORD=${VPN_PASS}
      - SERVER_COUNTRIES=Netherlands
    ports:
      - "8080:8080"  # qBittorrent UI (routed through VPN)
      - "6881:6881"   # Torrent port
      - "6881:6881/udp"
    restart: unless-stopped
    networks:
      - media_network

  # qBittorrent - Torrent Client (behind VPN)
  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:gluetun"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid
      - WEBUI_PORT=8080
    volumes:
      - ./qbittorrent/config:/config
      - /data/torrents:/downloads
    depends_on:
      - gluetun
    restart: unless-stopped

  # Prowlarr - Indexer Management
  prowlarr:
    image: linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid
    volumes:
      - ./prowlarr/config:/config
    ports:
      - "9696:9696"
    restart: unless-stopped
    networks:
      - media_network

  # Radarr - Movies
  radarr:
    image: linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid
    volumes:
      - ./radarr/config:/config
      - /data/media/movies:/movies
      - /data/torrents/movies:/downloads
    ports:
      - "7878:7878"
    restart: unless-stopped
    networks:
      - media_network

  # Sonarr - TV Shows
  sonarr:
    image: linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid
    volumes:
      - ./sonarr/config:/config
      - /data/media/tv:/tv
      - /data/torrents/tv:/downloads
    ports:
      - "8989:8989"
    restart: unless-stopped
    networks:
      - media_network

  # Jellyfin - Media Server
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid
    volumes:
      - ./jellyfin/config:/config
      - ./jellyfin/cache:/cache
      - /data/media:/media:ro
    ports:
      - "8096:8096"
      - "8920:8920"
    restart: unless-stopped
    networks:
      - media_network
    # Uncomment for hardware transcoding:
    # devices:
    #   - /dev/dri:/dev/dri  # Intel QuickSync
