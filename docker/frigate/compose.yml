# Frigate - NVR with AI object detection
# Docs: https://docs.frigate.video
# Access: http://192.168.1.142:5000
#
# IMPORTANT - Before starting:
# 1. Set FRIGATE_RTSP_PASSWORD in docker/.env
# 2. Run: ssh root@192.168.1.142 "apt install -y intel-opencl-icd intel-igc-cm && groupadd -g 44 video && usermod -aG video root"

services:
  frigate:
    container_name: frigate
    # Use full access variant for OpenVINO GPU support
    image: ghcr.io/blakeblackshear/frigate:stable
    restart: unless-stopped
    privileged: true
    network_mode: "host"
    shm_size: "512m"
    volumes:
      - /root/docker/frigate/config:/config
      - /root/docker/frigate/media:/media/frigate
      - /dev/dri:/dev/dri:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - FRIGATE_RTSP_PASSWORD=${FRIGATE_RTSP_PASSWORD}
      - TZ=Europe/Madrid
    tmpfs:
      - /tmp/cache:size=256M
