# Garage v2.3.0 config for single-node deployment on LXC 101 (192.168.1.142)
#
# Tokens are provided via environment variables (GARAGE_ADMIN_TOKEN, GARAGE_METRICS_TOKEN)
# which override the config file values at runtime. Do NOT put tokens directly here.
#
# See https://garagehq.deuxfleurs.fr/documentation/reference-manual/configuration/

metadata_dir = "/var/lib/garage/meta"
data_dir = "/var/lib/garage/data"
db_engine = "sqlite"

# Single-node: replication_factor = 1
replication_factor = 1

rpc_bind_addr = "0.0.0.0:3901"
rpc_public_addr = "192.168.1.142:3901"
rpc_secret = "1799bccfd7411eddcf9ebd316bc1f5287ad12a68094e1c6ac6abde7e6feae1ec"

bootstrap_peers = []

[s3_api]
api_bind_addr = "0.0.0.0:3900"
s3_region = "garage"
root_domain = ".s3.garage.localhost"

[s3_web]
bind_addr = "0.0.0.0:3902"
root_domain = ".web.garage.localhost"

[admin]
api_bind_addr = "0.0.0.0:3903"
# admin_token and metrics_token are NOT set here
# They are passed via GARAGE_ADMIN_TOKEN / GARAGE_METRICS_TOKEN env vars
