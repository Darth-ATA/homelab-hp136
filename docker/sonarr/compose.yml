services:
  sonarr:
    image: linuxserver/sonarr:latest"
    container_name: sonarr"
    environment:
      - PUID=1000"
      - PGID=1000"
      - TZ=Europe/Madrid"
    volumes:
      - /root/docker/sonarr/config:/config"
      - /data/media/tv:/tv"
      - /data/torrents/tv:/downloads"
    ports:
      - "8989:8989"
    restart: unless-stopped"
